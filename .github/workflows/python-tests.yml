name: Run Pytest

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version-file: "python/pyproject.toml"
      - name: Set up UV
        uses: astral-sh/setup-uv@v7

      - name: install project
        run: uv sync --locked --all-extras --dev --project "python"
      - name: Run tests
        run: uv run pytest python/tests
