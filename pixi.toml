[workspace]
authors = ["Hannes Neuschmidt <hannes.neuschmidt@brockmann-consult.de>"]
channels = ["conda-forge"]
name = "apex-force-openeo"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

test-openeo = {
    cmd = [
        "pytest",
        "test/openeo"
    ],
    default-environment="test"
}

[environments]
test = ["test"]

[feature.test.dependencies]
pytest = ">=9.1.1,<10"
openeo = ">=0.50.0,<0.51"

[dependencies]
pixi-pycharm = ">=0.0.11,<0.0.12"
